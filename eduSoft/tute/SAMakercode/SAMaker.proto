&&&PERL&&& -I&&&SAMAKERDIR&&& -w

#-----------------------------------------------------------------------

=head1 NAME

SAMaker - a program to create a Self-Assessment on the WWW

=head1 SYNOPSIS

 SAMaker \
   [-help] \
   [-verbose] \
   [-version] \
   [-verbatim_answers] \
   [-embedded_text string] \
   [-format format] \
   -database directory \
   -stats page \
   -entry page < input

=head1 DESCRIPTION

B<SAMaker> is a program to create a self-assessment from an input
file.

=head1 EXAMPLE USAGE

Create a self-assessment using the SinglePage format in the current directory

 SAMaker \
   [-help] \
   [-verbose] \
   [-version] \
   [-verbatim_answers] \
   [-embedded_text string] \
   [-format SinglePage] \
   -database ./dbs \
   -stats types-stats.html \
   -entry types.html < input

=cut

#-----------------------------------------------------------------------
  use strict;
  #require 5.002;
 
  use Getopt::Long;
  use English;

  use TextDB;
  require "SAMakerTags.pm";

  require "cleanWS.pm";

# Global variables
  my $SAMAKERNAME = 'SAMaker';
  my $VERSION = '1.2';
  my $FORMAT = '&&&FORMATDIR&&&/SinglePage';
  my $PATH = '';
  my $VERBOSE = '';
  my $SHOW_VERSION = '';
  my $HTML_IN_ANSWERS = '';
  my $STATS_PAGE = '';
  my $ENTRY_PAGE = '';
  my $SHOW_HELP = '';
  my $HTMLBASE = '';
  my $ROOT = '&&&ROOT&&&';
  my $EXTENSION = '&&&EXTENSION&&&';
  my $EMBEDDED_TEXT = '';

  my @tokens = ();

# Global counters
  my $question = 0;
  my $pageCounter = 0;
  my $questionCounter = 0;
  my $questionSetCounter = 0;

# Assume one question per page
  my $individualPages = 0;

# Assume no parsing pattern
  my $Pattern = "";

  &ParseCommandLine();

  #check to see if test directory exists
  (-e $PATH) || die "no test directory $PATH\n";
  #open global databases
  my $randomdb = new TextDB();
  $randomdb->STORE('values', []);

  # Initialize the current page state;
  my %currentPage = {};
  $currentPage{'root'} = $ROOT;
  $currentPage{'extension'} = $EXTENSION;
  $currentPage{'embeddedText'} = $EMBEDDED_TEXT;
  $currentPage{'headerText'} = '';
  $currentPage{'returnText'} = '';
  $currentPage{'footerText'} = '';
  $currentPage{'questionText'} = " ";
  $currentPage{'collectStatistics'} = 1;
  $currentPage{'hiddenText'} = "";
  $currentPage{'returnToWhereText'} = " ";
  $currentPage{'caseInsensitive'} = 1;

  # Initialise the default formats
  my %formats = {};

  # Initialize the lexical analyzer
  &initTokenizer();
  # Parse it
  &parse();
 
  # Set up hidden variables
  my $hidden = new TextDB();
  $hidden->STORE('path', $PATH);
  $hidden->STORE('page', 1);
  $hidden->STORE('collectStatistics', $currentPage{'collectStatistics'});
  $currentPage{'hiddenText'} = $hidden->toString();
 
  # Emit the entry pages
  &emitEntryPage();
  if ($currentPage{'collectStatistics'}) {&emitStatsPage();}
  &emitExitPage();
  #&emitMasterControlPage();}
  &emitEmbeddedPage() if ($EMBEDDED_TEXT);
 
  # Save the global Databases!
  $randomdb->save("$PATH/randomdb", 0640);
  my $statsdb = new TextDB;
  $statsdb->STORE('statsQuestionFormat', 
      &format($formats{'StatsQuestionFormat'}, new TextDB()));
  $statsdb->STORE('statsPresentationFormat', 
      &format($formats{'StatsPresentationFormat'}, new TextDB()));
  $statsdb->save("$PATH/statsQuestiondb", 0640);
  $randomdb->save("$PATH/randomdb", 0640);

