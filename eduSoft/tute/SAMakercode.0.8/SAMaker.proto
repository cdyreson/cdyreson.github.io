close(OUTSTATS);

sub process_directions{
  local ($line, @lines, $person, $login, $key);
  
  #check to see if test directory exists
  (-e $direction{"test-directory"}) || die "no test directory " . 
                                            $direction{"test-directory"} .
                                            "\n";
  #open databases
  $path = $direction{"test-directory"};
  open_dbms($path) || die "could not open dbms \n";
  
  #process tute-list
  @lines = split("\n", $direction{"tute-list"});
  foreach $line (@lines) {
    ($person, $login) = split("=", $line);
    $person =~ s/^\s*//;
    $person =~ s/\s*$//;
    $login =~ s/^\s*//;
    $login =~ s/\s*$//;
    $tutedb{$login} = $person;
    $rvtutedb{$person} = $login;
    }
  delete $direction{"tute-list"};

  #process class-list
  @lines = split("\n", $direction{"class-list"});
  foreach $line (@lines) {
    ($person, $login) = split("=", $line);
    $person =~ s/^\s*//;
    $person =~ s/\s*$//;
    $login =~ s/^\s*//;
    $login =~ s/\s*$//;
    $classdb{$login} = $person;
    $rvclassdb{$person} = $login;
    }
  delete $direction{"class-list"};

  #fill in relevant values in the directions database
  foreach $key (keys %direction) {
    $directionsdb{$key} = $direction{$key};
    }

  return 1;
}

# open databases
sub open_dbms{
  local ($path) = @_;

  # open and clear question db
  $qdb->open("$path/questiondb", 0640) || die "open failed questions\n";
  $qdb->clear;

  # open and clear explanation db
  $edb->open("$path/explaindb", 0640) || die "open failed explain\n";
  $edb->clear;

  # open and clear hint db
  $hdb->open("$path/hintdb", 0640) || die "open failed hint\n";
  $hdb->clear;

  # open and clear answer db
  dbmopen(%answerdb, "$path/answerdb", 0640) || die "open failed answer\n";
  # create answerdb anew
  foreach $key (keys %answerdb) {
    delete $answerdb{$key};
    }

  # open and clear random db
  dbmopen(%randomdb, "$path/randomdb", 0640) || die "open failed random\n";
  # create randomdb anew
  foreach $key (keys %randomdb) {
    delete $randomdb{$key};
    }

  # open and clear class db
  dbmopen(%classdb, "$path/classdb", 0660) || die "open failed class\n";
  # create classdb anew
  foreach $key (keys %classdb) {
    delete $classdb{$key};
    }

  # open and clear rvclass db
  dbmopen(%rvclassdb, "$path/rvclassdb", 0660) || die "open failed rvclass\n";
  # create rvclassdb anew
  foreach $key (keys %rvclassdb) {
    delete $rvclassdb{$key};
    }

  # open and clear tute db
  dbmopen(%tutedb, "$path/tutedb", 0660) || die "open failed tute\n";
  # create tutedb anew
  foreach $key (keys %tutedb) {
    delete $tutedb{$key};
    }

  # open and clear rvtute db
  dbmopen(%rvtutedb, "$path/rvtutedb", 0660) || die "open failed rvtute\n";
  # create rvtutedb anew
  foreach $key (keys %rvtutedb) {
    delete $rvtutedb{$key};
    }

  # open and clear directions db
  dbmopen(%directionsdb, "$path/directionsdb", 0640) || die "open failed directions\n";
  # create directionsdb anew
  foreach $key (keys %directionsdb) {
    delete $directionsdb{$key};
    }
  return 1;
}

