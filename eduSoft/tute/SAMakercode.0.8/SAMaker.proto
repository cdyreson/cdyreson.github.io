  ($tdirectory, $tpage, $spage) = @ARGV;
  $direction{"test-directory"} = $tdirectory;
  $direction{"tute-page"}= $tpage;
  $direction{"stats-page"}=$spage;
  }
else {
  die "use SAMaker as follows\n  SAMaker db_directory tute_page stats_page <infile.\n";
  }

# slurp standard in, ignoring comments (lines that start with %)
$message = "\n";
while (<STDIN>) {
  if (!/^%/) {$message .= $_;}
  }

# set up tags
$hbtag = '\(HTML-BASE\)';
$rtwtag = '\(RETURN-TO-WHERE\)';
$ertwtag = '\(EMAIL-RESULTS-TO-WHOM\)';
$tdtag = '\(TEST-DIRECTORY\)';
$tptag = '\(TUTE-PAGE\)';
$sptag = '\(STATS-PAGE\)';
$tetag = '\(TEST-ENTRY\)';
$tfdtag = '\(TF-DIRECTIONS\)';
$tfmtag = '\(TF-MARKS\)';
$tfnmtag = '\(TF-NEGATIVE-MARKS\)';
$mmdtag = '\(MM-DIRECTIONS\)';
$mmmtag = '\(MM-MARKS\)';
$mmnmtag = '\(MM-NEGATIVE-MARKS\)';
$mcdtag = '\(MC-DIRECTIONS\)';
$mcmtag = '\(MC-MARKS\)';
$mcnmtag = '\(MC-NEGATIVE-MARKS\)';
$sadtag = '\(SA-DIRECTIONS\)';
$samtag = '\(SA-MARKS\)';
$sanmtag = '\(SA-NEGATIVE-MARKS\)';
$eadtag = '\(EA-DIRECTIONS\)';
$eamtag = '\(EA-MARKS\)';
$eanmtag = '\(EA-NEGATIVE-MARKS\)';
$rotag = '\(RANDOM-ORDER\)';
$dtag = '\(DIRECTIONS\)';
$nmtag = '\(NEGATIVE-MARKS\)';
$mtag = '\(MARKS\)';
$cltag = '\(CLASS-LIST\)';
$ctag = '\(CLASS\)';
$tltag = '\(TUTE-LIST\)';
$qtag = '\(QUESTIONS\)';
$qstag = '\(QUESTIONSET\)';
$wtag = '\(W\)';
$rtag = '\(R\)';
$htag = '\(H\)';
$etag = '\(E\)';
$ttag = '\(T\)';
$ftag = '\(F\)';
$mmtag = '\(MM\)';
$mctag = '\(MC\)';
$satag = '\(SA\)';
$eatag = '\(EA\)';
$mytag = '\(MA\)';
$newblank = '\n\s*';

# Split text into directions and questions
$directionspattern = "$newblank$qtag";
($directions_text, $questions_text) = split(/$directionspattern/i,$message);

# Parse the directions
$directionspattern = "$newblank($rtwtag|$ertwtag|$tptag|$sptag|$hbtag|$tdtag|$tetag|$tltag|$ctag|$cltag|$tfdtag|$tfmtag|$tfnmtag|$mmdtag|$mmmtag|$mmnmtag|$mcdtag|$mcmtag|$mcnmtag|$sadtag|$samtag|$sanmtag|$eadtag|$eamtag|$eanmtag|$rotag|$qtag)";
@fields = split(/$directionspattern/i, $directions_text);
$ndex = 1;
while ($tag = $fields[$ndex]) {
  $_ = $tag;
  #chew up white space at both ends (parsing of fields depends on this!)
  my ($tempString) = $fields[$ndex+1];
  $tempString =~ s/^\s+//;
  $tempString =~ s/\s+$//;
  $tempString =~ s/<P>+$//;
  $tempString =~ s/\s+$//;
  $fields[$ndex+1] = $tempString;

  CASE: {
  /$ertwtag/i && do {$direction{"email"}=$fields[$ndex+1]; last CASE;};
  /$rtwtag/i && do {$direction{"return-to-where"}=$fields[$ndex+1]; last CASE;};
  /$hbtag/i && do {$direction{"html-base"}=$fields[$ndex+1]; last CASE;};
  #/$tdtag/i && do {$direction{"test-directory"}=$fields[$ndex+1]; last CASE;};
  #/$tptag/i && do {$direction{"tute-page"}=$fields[$ndex+1]; last CASE;};
  #/$sptag/i && do {$direction{"stats-page"}=$fields[$ndex+1]; last CASE;};
  /$tetag/i && do {$direction{"test-entry"}=$fields[$ndex+1]; last CASE;};
  /$ctag/i && do {
    $direction{"class"}=$fields[$ndex+1]; 
    $ROOT .= '/' . $direction{'class'};
    last CASE;};
  /$cltag/i && do {$direction{"class-list"}=$fields[$ndex+1]; last CASE;};
  /$tltag/i && do {$direction{"tute-list"}=$fields[$ndex+1]; last CASE;};
  /$tfdtag/i && do {$direction{"tf-directions"}=$fields[$ndex+1]; last CASE;};
  /$mcdtag/i && do {$direction{"mc-directions"}=$fields[$ndex+1]; last CASE;};
  /$eadtag/i && do {$direction{"ea-directions"}=$fields[$ndex+1]; last CASE;};
  /$sadtag/i && do {$direction{"sa-directions"}=$fields[$ndex+1]; last CASE;};
  /$rotag/i && do {$direction{"random-order"}=$fields[$ndex+1]; last CASE;};
  print "unrecognized tag $tag\n"; #default
  } #CASE
  $ndex += 2;
  } #while

&process_directions() || die "could not process directions";

$splitpattern = "$newblank$qstag";
@question_sets = split(/$splitpattern/i, $questions_text);
#ignore the first set (before the first (QUESTIONSET) is empty)
shift(@question_sets);
$set_index = 0;
foreach $question_set (@question_sets) {
  $splitpattern = "$newblank($ftag|$ttag|$mmtag|$mctag|$satag|$eatag|$mytag)";
  @questions = split(/$splitpattern/i, $question_set);
  $ndex = 1;
  $set_index++;
  $question_index = 0;
  while ($tag = $questions[$ndex]) {
    $questions[$ndex+1] =~ s/^\s*//;
    $questions[$ndex+1] =~ s/\s*$//;
    $questions[$ndex+1] =~ s/<P>+$//;
    $question_index++;
    $question = $set_index . ":" . $question_index;
    $_ = $tag;
    CASE2: {
      /$ttag/i && do {
        &truequestion($questions[$ndex+1]);
        last CASE2;
        };
      /$ftag/i && do {
        &falsequestion($questions[$ndex+1]);
        last CASE2;
        };
      /$mmtag/i && do {
        &mmquestion($questions[$ndex+1]);
        last CASE2;
        };
      /$mctag/i && do {
        &mcquestion($questions[$ndex+1]);
        last CASE2;
        };
      /$eatag/i && do {
        &eaquestion($questions[$ndex+1]);
        last CASE2;
        };
      /$satag/i && do {
        &saquestion($questions[$ndex+1]);
        last CASE2;
        };
      print "unrecognized tag $tag\n";  # default
      } #CASE2
    $ndex += 2;
    }
  $randomdb{"$set_index"} = $question_index;
  }

$temp = join("\e",(1..$set_index));
$tpage = $direction{'tute-page'};
$spage = $direction{'stats-page'};
@keys = sort(keys(%tutedb));
#@keys = reverse keys(%rvtutedb);
$size = scalar(@keys);
$options = "";
foreach $key (@keys) {
  $options .= "<OPTION  VALUE=\"$key\">$tutedb{$key}\n";
  }
open(OUT,">$tpage") || die "Sorry, couldn't create $tpage\n";
print OUT <<"HEAD";
<HEAD>
<TITLE>
Self-assessment
</TITLE>
</HEAD>
<BODY>
<FORM METHOD="POST" ACTION="$ROOT/starter$EXTENSION">
<H1> Hello and Welcome to the Self-assessment!</H1>
<HR>
<P>
Please choose when your tutorial meets.<BR>
<SELECT NAME="tute" SIZE=$size>
$options
</SELECT>
<P>
<INPUT TYPE="hidden" NAME="total_questions" VALUE="$question">
<INPUT TYPE="hidden" NAME="path" VALUE="$path">
<P>
<INPUT TYPE="submit" NAME="entry" VALUE="Continue">
</FORM>
</BODY>
HEAD
close(OUT);

#Please input the self-assessment password (your Computer Centre login, e.g., sci-aaa). <BR>
#<INPUT TYPE="password" NAME="password" VALUE="" SIZE=10> <BR>

open(OUTSTATS,">$spage") || die "Sorry, couldn't create $spage\n";
print OUTSTATS <<"HEAD";
<HEAD>
<TITLE>
Self-assessment Stats
</TITLE>
</HEAD>
<BODY>
