sub split_question {
  local ($in_question_text) = @_;
  local ($ndex, @info, $answer_text, $question_text, $directions_text, $hint_text);

  # split up each question still further
  $question_splitpattern = "$newblank($dtag|$etag|$htag|$mtag|$nmtag)";
  @info = split(/$question_splitpattern/i, $in_question_text);

  # remember out actual question
  $question_text = $info[0];
  $directions_text = "";
  $hint_text = "";
  $explain_text = "";

  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # directions
    if ($tag =~ /$dtag/i) {
      $directions_text = $info[$ndex + 1];
      }
    elsif ($tag =~ /$etag/i) {
      $explain_text = $info[$ndex + 1];
      }
    elsif ($tag =~ /$htag/i) {
      $hint_text = $info[$ndex + 1];
      }
    elsif ($tag =~ /$nmtag/i) {
      print "$info[$ndex + 1]";
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }
  return ($directions_text, $question_text, $hint_text, $explain_text);
}

sub truequestion {
  local ($in_question_text) = @_;
  local ($temp, @info, $directions_text, $question_text, , $explain_text, @answer_list, $hint_text);

  ($directions_text, $question_text, $hint_text, $explain_text) = &split_question($in_question_text);
  @answer_list = (&right_answer("true"," "), &wrong_answer("false"," "));
  $temp = &tfhead();
  $temp .= $directions_text . "<P>" . $question_text;
  #&anstextdbmwrite("$question",join("\f",@answer_list));
  $temp .= &reconstruct_answer_text(@answer_list);

  #&Bigdbm::write(*cntrl, *zdbm, "$question", $temp);
  $qdb->write("$question", $temp);
  $hdb->write("$question", $hint_text);
  $edb->write("$question", $explain_text);
  }

sub falsequestion {
  local ($in_question_text) = @_;
  local ($temp, @info, $directions_text, $question_text, $explain_text, $answer_text, $hint_text);

  ($directions_text, $question_text, $hint_text, $explain_text) = &split_question($in_question_text);
  @answer_list = (&wrong_answer("true"," "), &right_answer("false"," "));
  $temp = &tfhead();
  $temp .= $directions_text . "<P>" . $question_text;
  #&anstextdbmwrite("$question",join("\f",@answer_list));
  $temp .= &reconstruct_answer_text(@answer_list);
  #&Bigdbm::write(*cntrl, *zdbm,"$question",$temp);
  $qdb->write("$question", $temp);
  $hdb->write("$question", $hint_text);
  $edb->write("$question", $explain_text);
  }

sub eaquestion {
  local ($in_question_text) = @_;
  local (@answer_list, $ndex, $tag, $temp, @info, $directions_text, $ans,
        $question_text, $answer_text, $hint_text, $explain_text);

  # split question
  ($directions_text, $question_text, $hint_text, $explain_text) = &split_question($in_question_text);

  @info = ();
  # split up the answers still further
  $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];
  
  @answer_list = ();
  $ndex = 1;
  $tag = $info[$ndex];
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$rtag/i) {
      # answers must be all on one line!
      @ans = split(/\n/,$info[$ndex+1]);
      push(@answer_list, &right_answer($ans[0],$ans[0]));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  $temp = '';
  $temp = &eahead();
  $temp .= $directions_text . "<P>" . $question_text;
  #$temp .= &reconstruct_answer_text(@answer_list);
  $temp .= "<P> Put your answer here <INPUT TYPE=\"text\" NAME=\"answer\" VALUE=\"\" SIZE=30>";
  $temp .= "\n<P>\n" . &submit_button("ignore", "Click Here When Done");
  $qdb->write("$question", $temp);
  $hdb->write("$question", $hint_text);
  $edb->write("$question", $explain_text);
  }

# many choice question
sub mmquestion {
  local ($in_question_text) = @_;
  local ($tag, $ndex, @info, @answer_list, $question_text, $directions_text,
        @letters, $temp, $hint_text, $explain_text);

  ($directions_text, $question_text, $hint_text, $explain_text) = &split_question($in_question_text);
  # split up the answers still further
  $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];

  @answer_list = ();
  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$wtag/i) {
      push(@answer_list, &wrong_answer($info[$ndex+1], " "));
      }
    elsif ($tag =~ /$rtag/i) {
      push(@answer_list, &right_continuing_answer($info[$ndex+1], " "));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  $temp = &mmhead();
  $temp .= $directions_text . $question_text;
  $temp .= &reconstruct_menu_answer_text('MULTIPLE',@answer_list);
  $qdb->write("$question", $temp);
  $hdb->write("$question", $hint_text);
  $edb->write("$question", $explain_text);
  }

sub mcquestion {
  local ($in_question_text) = @_;
  local ($tag, $ndex, @info, @answer_list, $question_text, $directions_text,
        @letters, $temp, $hint_text, $explain_text);

  ($directions_text, $question_text, $hint_text, $explain_text) = &split_question($in_question_text);
  @letters = ('a'..'z');

  # split up the answers still further
  $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];
  
  @answer_list = ();
  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$wtag/i) {
      push(@answer_list, &wrong_answer(@letters[$ndex/2],$info[$ndex+1]));
      }
    elsif ($tag =~ /$rtag/i) {
      push(@answer_list, &right_answer(@letters[$ndex/2],$info[$ndex+1]));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  $temp = &mchead();
  $temp .= $directions_text . $question_text;
  $temp .= &reconstruct_answer_text(@answer_list);
  $qdb->write("$question", $temp);
  $hdb->write("$question", $hint_text);
  $edb->write("$question", $explain_text);
  }

sub reconstruct_menu_answer_text {
  local ($multiple, @answers) = @_;
  local ($value, $text, $s, $size);
 
  $size = scalar(@answers);
  $s = "<P> <SELECT NAME=\"answer\" SIZE=$size $multiple>";
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    $s .= '<OPTION> ' . $value;
    }
  $s .= '</SELECT>';
  $s .= "\n<P>\n";
  $s .= '<INPUT TYPE="hidden" NAME="answer" VALUE="">';
  $s .= &submit_button("ignore", "Click Here When Done");
  return $s;
  }
 
sub reconstruct_answer_text {
  local (@answers) = @_;
  local ($value, $text, $s);

  $s = "";
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    $s .= "<BR>";
    $s .= &submit_button("answer", $value);
    $s .= $text . "\n";
    }
  return $s;
  }

sub wrong_answer {
  local ($key_text,$answer_text) = @_;

  return $key_text . "\e" . $answer_text;
  }

# First argument is the answer, second argument is the previous answer?
sub right_continuing_answer {
  local ($key_text,$answer_text) = @_;

  $key_text =~ s/^\s*//;
  $key_text =~ s/\s*$//;
  if (! defined($answerdb{"$question"})) 
    { $answerdb{"$question"} = "\f" . $key_text . "\e"; }
  else 
    {$answerdb{"$question"} = $answerdb{"$question"} .  $key_text . "\e";}
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }

# First argument is the answer, second argument is the previous answer?
sub right_answer {
  local ($key_text,$answer_text) = @_;

  $key_text =~ s/^\s*//;
  $key_text =~ s/\s*$//;
  $answerdb{"$question"} = $answerdb{"$question"} . "\f" . $key_text;
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }

