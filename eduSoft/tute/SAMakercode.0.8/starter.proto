# Lincoln Stein's Fantabulous CGI package
use CGI;
$query = new CGI;
$ROOT = '&&&ROOT&&&';

# Build the header
print $query->header;

# Open databases
$path = $query->param('path');
dbmopen(%directionsdb, "$path/directionsdb", undef) || 
  &noopen("could not open $path/directionsdb");
dbmopen(%rvtutedb, "$path/rvtutedb", undef) || 
  &noopen("could not open $path/rvtutedb") ;
dbmopen(%classdb, "$path/classdb", undef) || 
  &noopen("could not open $path/classdb") ;
if (defined($directionsdb{'class'})) {
  $ROOT .= '/' . $directionsdb{'class'};
  }
dbmopen(%randomdb, "$path/randomdb", undef) ||
  &noopen("could not open $path/randomdb") ;

print $query->start_html('Directions','&&&MAILTO&&&');
# Make a security check
if (&entry_disallowed()) {
  print $query->end_html;
  exit();
  }

# Did someone forget to select their tute?
if (!$query->param('tute')) {
  print "Please go back to the previous page and select your tutorial.";
  print $query->end_html;
  exit();
  }

# Use pid version of password, this is token that will identify user for stats 
if (!$query->param('password')) {
  $query->param('password', getppid() . "." . time);
  }

# Security passed, continue with entry
$userid = $query->param('password');
$tute = $query->param('tute');

#crop userid 
$userid =~ s/^\s*//;
$userid =~ s/\s*$//;
# create student database
if (dbmopen(%sanswerdb, "$path/sadb." . $tute . ".$userid", undef)) {
  #previously opened, maybe the did a reload
  $seed = $sanswerdb{'seed'};
  }
else {
  # open new answer db
  dbmopen(%sanswerdb, "$path/sadb." . $tute . ".$userid", 0640) || 
     &noopen("could not open $path/sadb." . $tute . ".$userid");
  $seed = time;
  $sanswerdb{"seed"} = $seed;
  $sanswerdb{'total-tried'} = 0;
  $sanswerdb{'total-right'} = 0;
  }

#randomly pick and store which variants of questions user will do
srand($seed);
@question_list = ();
@answered_list = ();
@keys = sort(keys(%randomdb));
$questions_max = scalar(@keys);
for ($i=1; $i <= $questions_max; $i++) {
  $j = int(rand($randomdb{$i})) + 1;
  $question = "$i:$j";
  if (defined($sanswerdb{$question})) {push(@answered_list,$question);}
  else {push(@question_list,$question);}
  }

#Continue button.
print $query->startform('POST',"$ROOT/next&&&EXTENSION&&&");
print $query->hidden('userid',$userid);
print $query->hidden('path',$query->param('path'));
print $query->hidden('tute',$query->param('tute'));
print $query->hidden('remaining_questions',join("\e",@question_list));
print $query->hidden('answered_questions',join("\e",@answered_list));

print <<DIRECTIONS;
Use the mouse to select your choices.
When you are asked to enter text, if you are using netscape, first
click the mouse in the text box, and then you will be able to type in it.
<BR>
DIRECTIONS

print $query->submit("action", "Start Self-assessment");

print $query->endform;
print $query->end_html;

# Test the entry password, if it fails disallow entry to the
# survey and print an appropriate message, silly check I think, but 
# I'll leave it in in case someone wants to make it a serious check someday
sub entry_disallowed {

  return 0;  # do not check
  if (defined $classdb{$query->param('password')}) { return 0; }
  print "Sorry, the entry password that you typed is inactive.";
  return 1;
}

# clean up nicely when a file can't be opened
sub noopen {
  my ($text) = @_;
  print "Detected the following error: " . $text;
  print "<P> Please make sure that you file permissions are set to allow access by user nobody.";
  print $query->end_html;
  die;
}
