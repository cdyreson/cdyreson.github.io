# Me an Michael Sharpe's Big DBM package
use Bdbm;
# Lincoln Stein's Fantabulous CGI package
use CGI;
$qdb = new Bdbm;
$query = new CGI;
$ROOT = '&&&ROOT&&&';

# Restore state from hidden state
$path = $query->param('path');
$tute = $query->param('tute');
$us = $query->param('userid');
# Start the page
print $query->header;
# open databases
dbmopen(%answerdb, "$path/answerdb", undef) ||
  &noopen("could not open $path/answerdb");
dbmopen(%directionsdb, "$path/directionsdb", undef) || 
  &noopen("could not open $path/directionsdb");
if (defined($directionsdb{'class'})) {
  $ROOT .= '/' . $directionsdb{'class'};
  }
$qdb->open("$path/questiondb", undef);
dbmopen(%sadb, "$path/sadb." . $tute . ".$us", undef) || 
  &noopen("could not open $path/sadb." . $tute . ".$us") ;

# establish which questions are left and which have been answered
if (defined($query->param('retry'))) {
  # User wants to retry the question
  $query->param('remaining_questions', $query->param('retry_remaining_questions'));
  $query->param('answered_questions', $query->param('retry_answered_questions'));
  }
elsif (defined($query->param('next'))) {
  # User wants to do the next question
  $query->param('remaining_questions', $query->param('next_remaining_questions'));
  $query->param('answered_questions', $query->param('next_answered_questions'));
   }
elsif (defined($query->param('lookatanswer'))) {
  # User wants to look at the answer
  $query->param('remaining_questions', $query->param('next_remaining_questions'));
  $query->param('answered_questions', $query->param('next_answered_questions'));
  }
elsif (defined($query->param('hint'))) {
  # User wants the hint
  $query->param('remaining_questions', $query->param('hint_remaining_questions'));
  $query->param('answered_questions', $query->param('hint_answered_questions'));
  }
elsif (defined($query->param('skip'))) {
  # User wants to skip this question and come back to it later
  $query->param('remaining_questions', $query->param('skip_remaining_questions'));
  $query->param('answered_questions', $query->param('skip_answered_questions'));
  }

# User wants to look at the answer
if (defined($query->param('lookatanswer'))) {
  # question key consists of an overall number and variant
  $qu = $query->param('question');
  ($sec, $q) = split("\:",$qu);

  print $query->start_html("Answer for Question $sec",'&&&MAILTO&&&');
  # fix it so that relative images work
  print $directionsdb{'html-base'} . "\n";

  # format the answer(s)
  print '<HR>';
  print "Answer(s) <UL>";
  $tempanswer  = $answerdb{$qu};
  $tempanswer =~ s/[\e\f]/<LI>/g;
  $tempanswer =~ s/<LI>$//g;
  print "$tempanswer</UL>";

  #old way of formatting answers
  #print "Answer(s) <BR><UL>";
  #print join('<LI> ',split("\f",$answerdb{$qu}));
  #print '</UL>';

  # if an explanation exists the let's show it
  if (-e "$path/explaindb.pag") {
    $edb = new Bdbm;
    $edb->open("$path/explaindb", undef) || &noopen("could not open $path/explaindb");
    print $edb->read("$qu");
    }

  @question_list = split("\e",$query->param('remaining_questions'));
  @answered_list = split("\e",$query->param('answered_questions'));

  # Next Question
  print $query->startform('POST',"$ROOT/next&&&EXTENSION&&&");
  print &hidden('path',$path);
  print &hidden('tute',$tute);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('question',$question);
  print &hidden('remaining_questions',join("\e",@question_list) || "");
  print &hidden('answered_questions',join("\e",@answered_list));
  print $query->submit("action", "Next Question");
  print &questionsLeft(scalar(@question_list));
  print $query->endform;
  print '<HR>';

  # format the question
  print $query->startform('POST',"$ROOT/marker&&&EXTENSION&&&");
  print &hidden('path',$path);
  print &hidden('tute',$tute);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  #print &hidden('remaining_questions',join("\e",unshift(@question_list,$qu)) || "");
  #print &hidden('answered_questions',join("\e",@answered_list));
  print &hidden('question',$qu);
  print &hidden('remaining_questions',join("\e",@question_list) || "");
  print &hidden('answered_questions',join("\e",@answered_list));

  print $qdb->read("$qu");
  print $query->endform('POST',"$ROOT/marker&&&EXTENSION&&&");


  # Exit lesson links
  print '<HR>';
  print '<P>';
  print $directionsdb{'return-to-where'};
  print $query->end_html;
  }

# User gave an answer, let's mark it!
elsif (defined($query->param('answer'))) {
  $qu = $query->param('question');
  ($sec, $q) = split("\:",$qu);
  print $query->start_html("Current Marks for Question $sec",'&&&MAILTO&&&');
  # fix it so that images work
  print $directionsdb{'html-base'} . "\n";
  print '<HR>';
  print $query->startform('POST',"$ROOT/next&&&EXTENSION&&&");

  # answer may be a list
  @answer = $query->param('answer');
  $answer = join("\e",@answer);
  # strip any silly whitespace from answer
  $answer =~ s/^[\s\n]*//;
  $answer =~ s/[\s\n]*$//;
  # remember answer, put into student database
  $sadb{"$qu"} = $sadb{"$qu"} . "\f$answer";
  $sadb{'total-tried'} += 1;
  $total_tried = $sadb{'total-tried'};
  $total_right = $sadb{'total-right'};
  # bit of silliness with form feeds to demarcate end of answer, ugly hack
  # We test correctness by doing a regular expression match, first we set up
  # the two expressions to match
  $answer = "\f$answer\f";
  $anstext = $answerdb{"$qu"} . "\f";
  @question_list = split("\e",$query->param('remaining_questions'));
  @answered_list = split("\e",$query->param('answered_questions'));
  $answer_to_test = $answer;
  $answer_to_test =~ s/(\W)/\\$1/g;
  if ($anstext =~ /$answer_to_test/i) {
    # nailed it, right answer
    $sadb{'total-right'} += 1;
    $total_right = $sadb{'total-right'};
    print "Congratulations, your answer is correct.<BR>";
    print "Your current score is $total_right out of $total_tried.<BR>";

    # Next Question Button
    print &hidden('path',$path);
    print &hidden('tute',$tute);
    print &hidden('userid',$query->param('userid'));
    print &hidden('total_questions',$query->param('total_questions'));
    print &hidden('question',$question);
    print &hidden('remaining_questions',join("\e",@question_list) || "");
    print &hidden('answered_questions',join("\e",(@answered_list,$qu)));
    print $query->submit("action", "Next Question");
    print &questionsLeft(scalar(@question_list));
    print $query->endform;
    }
  else {
    # blew it, wrong answer
    # strip the form feeds?
    $tempanswer = substr($answer,1,-1);
    #print "Your answer `" . $tempanswer . "' is incorrect.<BR>";
    $tempanswer =~ s/[\e\f]/<LI>/g;
    $tempanswer =~ s/<LI>$//g;
    print "Your answer <UL><LI>" . $tempanswer . "</UL> is incorrect. ";
    print "Your current score is $total_right out of $total_tried.<BR>";
 
    # Old way of formatting answers
    #$tempanswer = substr($answer,1,-1);
    #print "Your answer `" . $tempanswer . "' is incorrect.<BR>";
    #print "Your current score is $total_right out of $total_tried.<BR>";

    # Retry Question Button
    print &hidden('path',$path);
    print &hidden('tute',$tute);
    print &hidden('userid',$query->param('userid'));
    print &hidden('total_questions',$query->param('total_questions'));
    print &hidden('question',$qu);
    print &hidden('retry_remaining_questions',join("\e",($qu,@question_list)));
    print &hidden('retry_answered_questions',join("\e",@answered_list));
    print $query->submit("retry", "Retry Question");

    # Look at Answer Button
    print $query->submit("lookatanswer", "Look at Answer");

    # Next Question Button
    print &hidden('next_remaining_questions',join("\e",@question_list) || "");
    print &hidden('next_answered_questions',join("\e",(@answered_list,$qu)));
    print $query->submit("next", "Next Question");
    print &questionsLeft(scalar(@question_list));
    print $query->endform;
    } 
  print '<HR>';
  print '<P>';
  print $directionsdb{'return-to-where'};
  print $query->end_html;
  }

# Wants to try a question, show the question
else {
  @question_list = split("\e",$query->param('remaining_questions'));
  @answered_list = split("\e",$query->param('answered_questions'));
  $question = shift(@question_list);
  ($sec, $ques) = split("\:",$question);

  # Check to see if we have any questions left, if we do then process the
  #  question normally
  if ($question) {

  print $query->start_html("Question $sec",'&&&MAILTO&&&');
  print $directionsdb{'html-base'} . "\n";

  # determine if hints are available
  if (-e "$path/hintdb.pag") {
    $hdb = new Bdbm;
    $hdb->open("$path/hintdb", undef) || &noopen("could not open $path/hintdb");
    # get the hint for this question
    $hint = $hdb->read("$question");
    # did user previously ask to see the hint?
    if (defined($query->param('hint'))) {
      print $hint;
      print "<HR>";
      }
    }

  # show question
  print $query->startform('POST',"$ROOT/marker&&&EXTENSION&&&");
  print &hidden('path',$path);
  print &hidden('tute',$tute);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('question',$question);
  print &hidden('remaining_questions',join("\e",@question_list));
  print &hidden('answered_questions',join("\e",(@answered_list,$question)));
  print $qdb->read("$question");
  print $query->endform;

  # skip button
  print $query->startform('POST',"$ROOT/skip&&&EXTENSION&&&");
  print &hidden('path',$path);
  print &hidden('tute',$tute);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('skip_remaining_questions',join("\e",(@question_list,$question)));
  print &hidden('skip_answered_questions',join("\e",@answered_list));
  print "<HR>";
  print $query->submit("skip", "Skip Question");

  # hint button, if hint exists
  if (-e "$path/hintdb.pag") {
    if ($hint) {
      print &hidden('hint_remaining_questions',join("\e",($question, @question_list)));
      print &hidden('hint_answered_questions',join("\e",@answered_list));
      print $query->submit("hint", "Hint");
      }
    }
  print $query->endform;

  # return to root
  print '<P>';
  print $directionsdb{'return-to-where'};
  print $query->end_html;

} # end of if there really is a question

# now do the case where we have hit the final page
else {
  print $query->start_html('Self-assessment Completed','&&&MAILTO&&&');
  print $directionsdb{'html-base'} . "\n";
  print '<P>';
  print '<H1> All done with the self-assessment! </H1>';
  # return to root
  print '<P>';
  print $directionsdb{'return-to-where'};
  print $query->end_html;

} # end of final page section

} # of no answer

# Fix it so that hidden variables work correctly
sub hidden {
  my ($name, $value) = @_;
  $query->param($name, $value);
  return $query->hidden($name, $value);
}

# Clean-up nicely when I couldn't open a file/dbm
sub noopen {
  my ($text) = @_;
  print $query->start_html('Error opening Files','&&&MAILTO&&&');
  print "Detected the following error: " . $text;
  print "<P> Please make sure that you file permissions are set to allow access by user nobody.";
  print $query->end_html;
  die;
}

sub questionsLeft {
  my ($number) = @_;
  if ($number == 0) { return 'All done!';}
  if ($number == 1) { return 'There is only one more question.';}
  return "There are $number more questions.";
}
