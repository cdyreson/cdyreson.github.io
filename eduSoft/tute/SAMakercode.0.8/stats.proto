# Me an Michael Sharpe's Big DBM package
use Bdbm;
# Lincoln Stein's Fantabulous CGI package
use CGI;
$query = new CGI;
$qdbm = new Bdbm;
$sdbm = new Bdbm;
$ROOT = '&&&ROOT&&&';

# Build the header
print $query->header;

# Open databases
$path = $query->param('path');
dbmopen(%answerdb, "$path/answerdb", undef) || 
  &noopen("could not open $path/answerdb");
dbmopen(%classdb, "$path/classdb", undef) || 
  &noopen("could not open $path/classdb") ;
dbmopen(%randomdb, "$path/randomdb", undef) ||
  &noopen("could not open $path/randomdb") ;
dbmopen(%tutedb, "$path/tutedb", undef) ||
  &noopen("could not open $path/tutedb") ;
dbmopen(%directionsdb, "$path/directionsdb", undef) ||
  &noopen("could not open $path/directionsdb") ;
dbmopen(%rvtutedb, "$path/rvtutedb", undef) ||
  &noopen("could not open $path/rvtutedb") ;
$qdbm->open("$path/questiondb", 0640) || 
  &noopen("could not open $path/questiondb") ;

print $query->start_html('Stats','&&&MAILTO&&&');
print $directionsdb{'html-base'} . "\n";
# Make a security check
if (&entry_disallowed()) {
  print $query->end_html;
  exit();
  }

# Security passed, continue 

if (defined($query->param('entry'))) {
  $asdbm = new Bdbm;
  $asdbm->open("$path/allstats", 0640) ||
    &noopen("could not open $path/allstats") ;
  $asdbm->clear;

  @keys = $qdbm->keys;
  foreach $key (@keys) {
    $asdbm->write("$key-tried", 0);
    $asdbm->write("$key-correct", 0);
    $asdbm->write("$key-answers", ' ');
    }
  
  # create statsdb for tute anew
  foreach $tute (keys %tutedb) {
    $sdbm->open("$path/stats." . $tute, 0640) ||
      &noopen("could not open $path/stats." . $tute) ;
    $sdbm->clear;

    # initialize statsdb, cycle through each question 
    @keys = $qdbm->keys;
    foreach $key (@keys) {
      $sdbm->write("$key-tried", 0);
      $sdbm->write("$key-correct", 0);
      $sdbm->write("$key-answers", ' ');
      }

    # cycle through each student db in the directory
    while (<$path/sa*.pag>) {
      @temp = split('/');
      $filename = pop @temp;
      ($prefix,$tutename,$userid,$time) = split(/\./,$filename);
      if (!($tutename eq $tute)) {next;};
      $dbname = join(".", ($prefix,$tutename,$userid,$time));
      dbmopen(%sanswerdb, "$path/$dbname", undef) || 
        &noopen("could not open studentdb $path/$dbname") ;  
 
      # cycle through each answer in the student db
      foreach $key (sort keys %sanswerdb) {
        if ($key eq "seed") {next;}
        if ($key eq "total-right") {next;}
        if ($key eq "total-tried") {next;}
        @student_answers = split("\f",$sanswerdb{"$key"});
        shift @student_answers; 
   
        defined($answerdb{"$key"}) || die "no question $key $dbname";
        $anstext = $answerdb{"$key"};
        foreach $answer (@student_answers) {
          $sdbm->write("$key-answers", $sdbm->read("$key-answers") . "\f" . $answer);
          $sdbm->write("$key-tried", $sdbm->read("$key-tried") + 1);
          $asdbm->write("$key-answers", $asdbm->read("$key-answers") . "\f" . $answer);
          $asdbm->write("$key-tried", $asdbm->read("$key-tried") + 1);
          $answer_to_test = $answer;
          $answer_to_test =~ s/(\W)/\\$1/g;
          $answertemp = "\f" . $answer_to_test . "\f";
          $anstexttemp = $anstext . "\f";
          if ($anstexttemp =~ /$answertemp/i) {
            $sdbm->write("$key-correct", $sdbm->read("$key-correct") + 1);
            $asdbm->write("$key-correct", $asdbm->read("$key-correct") + 1);
            }
          }
        }
      dbmclose(%sanswerdb) || die "could not close studentdb $dbname" ;
      }
    $sdbm->close || die "could not close statsdb" ;
    }
  $asdbm->close || die "could not close statsdb" ;
  }
 
print $query->startform('POST',"$ROOT/stats&&&EXTENSION&&&");
print &hidden('path',$query->param('path'));
print &hidden('password',$query->param('password'));

# scrolling tute guy
#@keys = sort(keys(%rvtutedb));
@keys = keys(%rvtutedb);
%labels = ();
foreach $key (@keys) {
  $labels{"stats." . $rvtutedb{$key}} = $key;
  }
#@values = sort(keys(%labels));
@values = keys(%labels);
unshift @values, "allstats";
$labels{"allstats"} = "All tutorials";
$size = scalar(@values);
print $query->scrolling_list(-name=>'tute',
                             -values=>\@values,
                             -default=>'allstats',
                             -labels=>\%labels,
                             -size=>$size);

print '<BR>';
print $query->submit("action", "Submit Request");
print $query->endform;

if (defined($query->param('question'))) {
  $answers = $query->param('answers');

  $question = $query->param('question');
  @answers = split("\f",$answers);
  #print @answers;
  shift @answers;
  $total_answers = (scalar(@answers) || 1);
  %attempted = ();
  foreach $answer (@answers) {
    $attempted{"$answer"} = 0 unless defined($attempted{"$answer"});
    $attempted{"$answer"} += 1;
    }
  $s = "<BR> Student responses were \n <UL>";
  foreach $key (keys %attempted) {
    $percent = (10000 * $attempted{"$key"} / $total_answers) % 10100;
    $percent = substr($percent,0,-2) . "." . substr($percent,-2,2);
    $s .= "<li> $key -- $percent% (" . $attempted{"$key"} . ")\n";
    }
  $s .= "</UL>\n";
  print '<HR>';
  print $query->startform('POST',"$ROOT/dummy&&&EXTENSION&&&");
  print $qdbm->read("$question");
  print $query->endform;
  print "Answer is <BR><UL>";
  print join('<LI> ',split("\f",$answerdb{$question}));
  print '</UL>';
  print $s;
  print '<HR>';
  }
if (defined($query->param('tute'))) {
  $tute = $query->param('tute');
  $sdbm->open("$path/$tute", undef) ||
    &noopen("could not open $path/$tute") ;

  print "<BR><UL>\n"; 
  #foreach $key (sort ($qdbm->keys)) {
  foreach $key (reverse $qdbm->keys) {
    $tried = $sdbm->read("$key-tried");
    $correct = $sdbm->read("$key-correct");
    if ($tried) {
      &hidden('question',$key);
      &hidden('answers',$sdbm->read("$key-answers"));
      $myself = $query->self_url;
      #$pre = $query->startform('POST',"$ROOT/viewer&&&EXTENSION&&&") .
      #          &hidden('path',$query->param('path')) .
      #          &hidden('password',$query->param('password')) .
      #          &hidden('question',$key);
      $percent = (((100 * $correct) / $tried) % 101) . "%";
      #$percent = ((10000 * $correct) / $tried) % 10100;
      #$percent = substr($percent,0,-2) . "." . substr($percent,-2,2);
      #$percent .= '%';

      $outof = "($correct out of $tried)";
      #$button = $query->submit("action", "examine question");
      $button = "<A HREF=$myself>examine question</A>";
      #$post = $query->endform;
      $post = '';
      }
    else {
      $pre = ''; 
      $percent = 'none tried';
      $outof = '';
      $button = '';
      $post = ''
      }
    print "<LI> $pre $key $percent $outof $button $post\n";
    }
  print "</UL>\n"; 

}

print $query->end_html;

# Test the entry password, if it fails disallow entry to the
# survey and print an appropriate message, a silly test
sub entry_disallowed {
  
  if ($query->param('password') eq '32879nnfdabh43287bdfsauh32487') {return 0;}
  print "Sorry, stats are inactive.";
  return 1;
}

sub noopen {
  my ($text) = @_;
  print $query->start_html('Error opening Files','&&&MAILTO&&&');
  print "Detected the following error: " . $text;
  print "<P> Please make sure that you file permissions are set to allow access by user nobody.";
  print $query->end_html;
  die;
}

sub hidden {
  my ($name, $value) = @_;
  $query->param($name, $value);
  return $query->hidden($name, $value);
}
 
