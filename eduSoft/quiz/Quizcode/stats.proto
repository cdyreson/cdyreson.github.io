# Test the entry password, if it fails disallow entry to the
# survey and print an appropriate message
sub entry_disallowed {
  
  if ($query->param('password') eq $directionsdb{'stats-password'}) {return 0;}
  print "Sorry, stats are inactive.";
  return 1;
}

sub hidden {
  my ($name, $value) = @_;
  $query->param($name, $value);
  return $query->hidden($name, $value);
}
 
sub create_stats {
  &openAndCleardb(\%asdbm, "$path&&&SLASH&&&allstats");

  my @keys = &sortkeys(\%qdbm);
  foreach my $key (@keys) {
    $asdbm{"$key-tried"} = 0;
    $asdbm{"$key-none"} = 0;
    $asdbm{"$key-full"} = 0;
    $asdbm{"$key-tq"} = 0;
    $asdbm{"$key-q"} = 0;
    $asdbm{"$key-half"} = 0;
    $asdbm{"$key-answers"} = '';
    #&opendb(\%qanswerdb, "$path&&&SLASH&&&qanswer$key");
    &opendb(\%percentdb, "$path&&&SLASH&&&percent$key");
    # reinitialize percent db
    foreach my $qkey (keys %percentdb) {
      $percentdb{$qkey} = 0;
      }
    &closedb(\%percentdb, "$path&&&SLASH&&&percent$key");
    }

  # cycle through each student db in the directory
  opendir DIR, "$path"  || die "could not open directory $path: $!\n";
  my (@filenames) = grep { /^sadb/ && -f "$path&&&SLASH&&&$_" } readdir(DIR);
  closedir DIR;
  my $fileName;
  foreach my $fileName (@filenames) {
    &openReadOnlydb(\%sanswerdb, "$path&&&SLASH&&&$fileName");
    $fileName =~ /^sadb\./;
    my $userid = $';

    # cycle through each answer in the student db
    foreach my $key (&sortkeys(\%sanswerdb)) {
      next if ($key eq "seed");
      next if ($key eq "total-right");
      next if ($key eq "total-tried");
      $answer = $sanswerdb{"$key"};
 
      &opendb(\%qanswerdb, "$path&&&SLASH&&&qanswer$key");
      &opendb(\%percentdb, "$path&&&SLASH&&&percent$key");

      $asdbm{"$key-tried"} = $asdbm{"$key-tried"} + 1;
      $percentdb{$answer} = 0 unless defined($percentdb{$answer});
      $percentdb{$answer} = $percentdb{$answer} + 1;

      # Is is an answer we already have?
      if (defined($qanswerdb{$answer})) {
        if ($qanswerdb{$answer} eq 'full') { $asdbm{"$key-full"} = $asdbm{"$key-full"} + 1; }
        elsif ($qanswerdb{$answer} eq 'tq') { $asdbm{"$key-tq"} = $asdbm{"$key-tq"} + 1; }
        elsif ($qanswerdb{$answer} eq 'half') { $asdbm{"$key-half"} = $asdbm{"$key-half"} + 1; }
        elsif ($qanswerdb{$answer} eq 'q') { $asdbm{"$key-q"} = $asdbm{"$key-q"} + 1; }
        else { $asdbm{"$key-none"} = $asdbm{"$key-none"} + 1; }
        }
      else {
        $qanswerdb{$answer} = 'none';
        }
      &closedb(\%qanswerdb, "$path&&&SLASH&&&qanswer$key");
      &closedb(\%percentdb, "$path&&&SLASH&&&percent$key");
      }
    # untie will rewrite?
    #&closedb(\%sanswerdb);
    }
  &closedb(\%asdbm, "$path&&&SLASH&&&allstats");
}

sub markIndividual {
  my ($id) = @_;
  die "no id" unless defined $id;
  &openReadOnlydb(\%asdbm, "$path&&&SLASH&&&allstats");

  my $fileName = "$path&&&SLASH&&&sadb.$id";
  &openReadOnlydb(\%sanswerdb, $fileName);

  my @question_list = ();
  my @full_question_list = ();
  my @tq_question_list = ();
  my @half_question_list = ();
  my @q_question_list = ();
  my @none_question_list = ();
  my $student_marks = 0;
  my $total_marks = 0;

  my @keys = keys %sanswerdb;
  my $questions_max = scalar(@keys);
  my @question_list = &sortkeys(\%sanswerdb);
  foreach my $key (@question_list) {
    next unless $key;
    next if $key eq 'seed';
    my $student_answer = $sanswerdb{"$key"} || "no answer given";
    my ($question, $variant) = split(q{.}, "$key");
    &openReadOnlydb(\%qanswerdb, "$path&&&SLASH&&&qanswer$key");
    if (defined $qanswerdb{$student_answer}) {
      if ($qanswerdb{$student_answer} eq 'full') { push @full_question_list, $key; }
      elsif ($qanswerdb{$student_answer} eq 'tq') { push @tq_question_list, $key; }
      elsif ($qanswerdb{$student_answer} eq 'half') { push @half_question_list, $key; }
      elsif ($qanswerdb{$student_answer} eq 'q') { push @q_question_list, $key; }
      else { push @none_question_list, $key; }
      }
    else { push @none_question_list, $key; }
    # Will untie?
    # &closedb(\%qanswerdb);
    }

  # compute student mark
  foreach my $key (@full_question_list) {
    $total_marks += $marksdb{$key};
    $student_marks += $marksdb{$key};
    }
  foreach my $key (@tq_question_list) {
    $total_marks += $marksdb{$key};
    $student_marks += ($marksdb{$key}*0.75);
    }
  foreach my $key (@half_question_list) {
    $total_marks += $marksdb{$key};
    $student_marks += ($marksdb{$key}*0.5);
    }
  foreach my $key (@q_question_list) {
    $total_marks += $marksdb{$key};
    $student_marks += ($marksdb{$key}*0.25);
    }
  foreach my $key (@none_question_list) {
    $total_marks += $marksdb{$key};
    }

  $msg = "";
  # cycle through each question that the student replied to
  foreach my $key (@question_list) {
    next if $key eq 'seed';
    $student_answer = $sanswerdb{"$key"} || "no answer given";
    &openReadOnlydb(\%qanswerdb, "$path&&&SLASH&&&qanswer$key");

    if ($qanswerdb{$student_answer} ne 'full') {
      my $earned = 'You received no marks for your answer to this question.';
      $earned = 'You received <b>partial (three-quarters)</b> marks for your answer to this question.'
         if ($qanswerdb{$student_answer} eq 'tq');
      $earned = 'You received <b>partial (half)</b> marks for your answer to this question.'
         if ($qanswerdb{$student_answer} eq 'half');
      $earned = 'You received <b>partial (one-quarter)</b> marks for your answer to this question.'
         if ($qanswerdb{$student_answer} eq 'q');
      my %c = ();
      foreach my $answer (keys %qanswerdb) {
        $c{$answer} = 1 if $qanswerdb{$answer} eq 'full';
        }
      #die "must have some answer!" unless scalar(keys %c) > 0;
      $correct = join("' \n<li>       `", keys %c);
      my $explain = '';
      if (defined $explanationdb{$key}) {
         $explain = "An explanation of the question and expected answer is given below.<blockquote> " .
                    $explanationdb{$key} .
                    "</blockquote><br>";
         }
      my $student_answers = 'none given';
      $student_answers = join("' or `",split("\f",$sanswerdb{"$key"}));
      my ($just_question_num) = split('.',$key);
      my $ttt = $qdbm{"$key"};
      ($ttt) = split("<ADDRESS>",$ttt);
      $ttt =~ s/\n//;
      $ttt =~ s/\n//;
      $msg .= $ttt .
                "<P>$earned<Br>\n" .
                "Your answer is <ul><li>`$student_answers'</ul>\n" .
                "   accepted answers are <ul><li>`$correct'</ul>$explain\n" ;
      }
    # Will untie?
    #&closedb(\%qanswerdb);
    }
  $smarksdb{$id} = join(',', ($student_marks,$total_marks));
  # Will untie
  #&closedb(\%sanswerdb);

  #$result = "*****This web page is automatically generated.*****<BR/>\n" ;
  $result = '';
  $result .= '<FORM METHOD="POST" ACTION="dummy">';
  $result .= $classdb{$id};
  $result .= " scored $student_marks out of $total_marks, or ";
  if ($total_marks) {
    $result .= sprintf("%3.2f",($student_marks / $total_marks) * 100);
    }
  else {
    $result .= ' 0 ';
    }
  $result .= '%.<BR>' . "\n";
  if ($msg) {
    $result .= "The questions that were marked as (partially) incorrect are listed below.\n";
    $result .= $msg;
    }
  else {
    $result .= "Congratulations on your perfect mark.\n";
    }
  
  $result .= "\n</FORM><PRE>Here is an overall statistical breakdown on the quiz.\n";
  $result .= "         | # that   | # that    | % who answered \n";
  $result .= "         | attempted| answered  | answered       \n";
  $result .= "question | question | correctly | correctly      \n";
  $result .= "------------------------------------------------ \n";
  foreach my $question (@question_list) {
    next if $question eq 'seed';
    ($just_question_num) = split(/\./,"$question");
    $tried = $asdbm{"$question-tried"};
    $correct = $asdbm{"$question-full"};
    if ($tried) { $percentage = ($correct / $tried) * 100.0;}
    else {$percentage = 0;}
    $result .= "    " . substr("  " . $just_question_num, -3,3) . "  |   " .
             substr("  " . $tried,-3,3) . "    |   " .
             substr("  " . $correct,-3,3) . "     |    " .
             substr("   " . int($percentage), -3, 3) . "\%\n";
    }
  $class = $directionsdb{'class'};
  $result .= '</PRE>';

  # Remove any form feeds in the message
  $result =~ s/\f/ /g;
  return {'text' => $result, 'student marks' => $student_marks, 'total marks' => $total_marks};
  }

sub mailIndividualMarks {
  my $id = $query->param('individualUserid');
  die "no id" unless defined $id;

  # mark 'em
  my $result = &markIndividual($id);

  # add instructor check
  die "no instructor email address" unless defined $directionsdb{'email'};
  $email = $query->param('studentEmail');
  die "no email" unless defined $email;
  $mailto = $directionsdb{'email'};
  # for fake quiz
  if (-e "$path&&&SLASH&&&passworddb") {
     my $message = "Please use the attached page to view your quiz results.\n";
     $message .= "This message is automatically generated.\n";
     &sendAMailMessage($email,
                       "$class quiz results",
                       $message,
                       $globalHeader . $$result{'text'} . $query->end_html,
                       );
     }

  }

sub mailmarks {
  &openReadOnlydb(\%asdbm, "$path&&&SLASH&&&allstats");

  # cycle through each student db in the directory
  opendir DIR, "$path"  || die "could not open directory $path: $!\n";
  my (@filenames) = grep { /^sadb/ && -f "$path&&&SLASH&&&$_" } readdir(DIR);
  closedir DIR;
  foreach my $fileName (@filenames) {
    $fileName =~ /^sadb\./;
    my $userid = $';
    my $result = &markIndividual($userid);

    if (defined($query->param('action_email_to_students'))) {
      # add instructor check
      die "no instructor email address" unless defined $directionsdb{'email'};
      $mailto = $directionsdb{'email'};
      # for fake quiz
      if (-e "$path&&&SLASH&&&passworddb") {
        my $message = "Please use the attached page to view your quiz results.\n";
        $message .= "This message is automatically generated.\n";
        &sendAMailMessage($emaildb{$userid}, 
                          "$class quiz results", 
                          $message,
                          $globalHeader . $$result{'text'} . $query->end_html
                          );
        }
      }

    elsif (defined($query->param('action_email_to_instructor'))) {
      die "no instructor email address" unless defined $directionsdb{'email'};
      $mailto = $directionsdb{'email'};
      # for fake quiz
      if (-e "$path&&&SLASH&&&passworddb") {
        my $message = "Please use the attached page to view your quiz results.\n";
        $message .= "This message is automatically generated.\n";
        &sendAMailMessage($mailto, 
                          "$class quiz results", 
                          $message,
                          $globalHeader . $$result{'text'} . $query->end_html
                          );
        }
      }
    elsif (defined($query->param('action_lookat'))) {
      print $$result{'text'};
      }
    }
}

sub mailsummarymarks {
  # cycle through each student db in the directory
  my $result = '';
  opendir DIR, "$path"  || die "could not open directory $path: $!\n";
  my (@filenames) = grep { /^sadb/ && -f "$path&&&SLASH&&&$_" } readdir(DIR);
  closedir DIR;
  # run through all the stats and collect them
  my $message = '';
  foreach my $fileName (@filenames) {
    $fileName =~ /^sadb\./;
    my $userid = $';
    my $result = &markIndividual($userid);

    $message .= $classdb{$userid};
    $message .= " $userid scored " . $$result{'student marks'} . ' out of ' .  $$result{'total marks'} . "\n";
    }
  $class = $directionsdb{'class'};
  die "no instructor email address" unless defined($directionsdb{'email'});
  $mailto = $directionsdb{'email'};
  # for fake quiz
  if (-e "$path&&&SLASH&&&passworddb") {
    sendAMailMessage($mailto, "$class quiz results", $message, '');
    }
}

sub sortkeys {
  my ($hashref) = @_;
  my @questions = map { $_->[0] }
                  sort { $a->[1] <=> $b->[1]
                                  ||
                         $a->[2] <=> $b->[2]
                  } map { [$_, /(\d+)\.(\d+)/, uc($_)] } keys %$hashref;
  return @questions;
}  
 
sub sendAMailMessage {
  my ($to, $subject, $text, $attachment) = @_;
  #print "sending $to $subject $text";
  
  my $pid = time;
  if ($attachment ne '') {
    open(F1, "> /tmp/quizzes$pid.htm") || 
       die "could not open tmp/quizzes for write";
    print F1 $attachment;
    close F1;
    open(MAIL, 
          "| /net/local/bin/mutt -s \"$subject\" -a /tmp/quizzes$pid.htm $to"
        ) || die "could not open mail for writing";
    print MAIL $text;
    close MAIL;
    unlink "/tmp/quizzes$pid.htm";
    }
  else {
    open(MAIL, "| /net/local/bin/mutt -s \"$subject\" $to") 
       || die "could not open mail for writing";
    print MAIL $text;
    close MAIL;
    }
  }

