sub process_directions{
  local ($line, @lines, $person, $login, $key);
  
  #check to see if test directory exists
  (-e $direction{"test-directory"}) || die "no test directory " . 
                                            $direction{"test-directory"} .
                                            "\n";
  #open databases
  $path = $direction{"test-directory"};
  open_dbms($path);
  
  # open the passowrd file
  open(PASS,">$ppage") || die "Sorry, couldn't create $ppage\n";

  # open and clear the global password database
  &openAndCleardb(\%passworddb, "$path&&&SLASH&&&passworddb");

  # open and clear the long password database
  &openAndCleardb(\%longpassworddb, "$path&&&SLASH&&&longpassworddb");

  #process class-list
  die "no seed given, cannot generate passwords" unless $direction{'seed'};
  srand($direction{'seed'});
  @lines = split("\n", $direction{"class-list"});
  %all_passwords = (); # so we don't get the same password twice!
  foreach $line (@lines) {
    ($person, $login, $email, $password) = split("=", $line);
    $person =~ s/^\s*//;
    $person =~ s/\s*$//;
    $login =~ s/^\s*//;
    $login =~ s/\s*$//;
    $email =~ s/^\s*//;
    $email =~ s/\s*$//;
    if (defined $password) {
      $password =~ s/^\s*//;
      $password =~ s/\s*$//;
      $longpassworddb{$password} = $login;
      }
    $classdb{$login} = $person;
    $emaildb{$login} = $email;
    #$rvclassdb{$person} = $login;
    
    # open the student passowrd database and throw in the passwords
    &openAndCleardb(\%passwrddb, "$path&&&SLASH&&&pass.$login");

    # put in five passwords 
    my $passwrd;
    for ($i = 0; $i < 5; $i++) {
      do {
        $passwrd = int(rand(9999999));
      } until (!defined($all_passwords{$passwrd}));
      $passwrddb{$passwrd} = 'ok';
      $all_passwords{$passwrd} = 'ok';
      $passworddb{$passwrd} = $login;
      print PASS "\n\n\n$person $passwrd";
      }
    #print PASS "\n\n";
    &closedb(\%passwrddb, "$path&&&SLASH&&&pass.$login");

    }
  delete $direction{"class-list"};
  delete $direction{"seed"};
  close(PASS);
  &closedb(\%passworddb, "$path&&&SLASH&&&passworddb");
  &closedb(\%longpassworddb, "$path&&&SLASH&&&longpassworddb");

  #fill in relevant values in the directions database
  foreach $key (keys %direction) {
    $directionsdb{$key} = $direction{$key};
    }

  return 1;
}

