sub split_question {
  my ($in_question_text) = @_;
  my ($ndex, @info, $answer_text);

  # split up each question still further
  my $question_splitpattern = "$newblank($dtag|$htag|$mtag|$etag|$nmtag)";
  my @info = split(/$question_splitpattern/i, $in_question_text);

  # remember out actual question
  my $question_text = $info[0];
  my $directions_text = "";
  my $hint_text = "";
  my $explanation_text = "";

  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # directions
    if ($tag =~ /$dtag/i) {
      $directions_text = $info[$ndex + 1];
      }
    # hints
    elsif ($tag =~ /$htag/i) {
      $hint_text = $info[$ndex + 1];
      }
    # marks
    elsif ($tag =~ /$mtag/i) {
      &establish_marks($info[$ndex + 1]);
      }
    # negative marks
    elsif ($tag =~ /$nmtag/i) {
      &establish_negative_marks($info[$ndex + 1]);
      }
    # explanations 
    elsif ($tag =~ /$etag/i) {
      $explanation_text = $info[$ndex + 1];
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }
  return ($directions_text, $question_text, $hint_text, $explanation_text);
}

sub truequestion {
  my ($in_question_text) = @_;

  if (!$marksdb{"$question"}) {&establish_marks($directionsdb{"tf-marks"});}
  if (!$nmarksdb{"$question"}) {&establish_negative_marks($directionsdb{"tf-negative-marks"});}

  my ($directions_text, $question_text, $hint_text, $explanation_text) = &split_question($in_question_text);
  my @answer_list = (&right_answer("true"," "), &wrong_answer("false"," "));
  my $temp = &tfhead($marksdb{"$question"},$nmarksdb{"$question"});
  $temp .= $directions_text . "<P>" . $question_text;
  $temp .= &reconstruct_answer_text(@answer_list);

  $qdb{"$question"} = $temp;
  $hdb{"$question"} = $hint_text;
  $edb{"$question"} = $explanation_text;
  }

