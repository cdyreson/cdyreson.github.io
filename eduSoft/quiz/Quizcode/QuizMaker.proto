sub eaquestion {
  my ($in_question_text) = @_;

  if (!$marksdb{"$question"}) {&establish_marks($directionsdb{"ea-marks"});}
  if (!$nmarksdb{"$question"}) {&establish_negative_marks($directionsdb{"ea-negative-marks"});}

  # split question
  my ($directions_text, $question_text, $hint_text, $explanation_text) = &split_question($in_question_text);

  my @info = ();
  # split up the answers still further
  my $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];
  
  my @answer_list = ();
  my $ndex = 1;
  my $tag;
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$rtag/i) {
      # answers must be all on one line!
      my @ans = split(/\n/,$info[$ndex+1]);
      push(@answer_list, &right_answer($ans[0],$ans[0]));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  my $temp = '';
  $temp = &eahead($marksdb{"$question"},$nmarksdb{"$question"});
  $temp .= $directions_text . "<P>" . $question_text;
  $temp .= "<P> Put your answer here <INPUT TYPE=\"text\" NAME=\"answer\" VALUE=\"\" SIZE=30>";
  $temp .= "\n<P>\n" . &submit_button("ignore", "Done");

  $qdb{"$question"} = $temp;
  $hdb{"$question"} = $hint_text;
  $edb{"$question"} = $explanation_text;
  }

# many choice question
sub mmquestion {
  my ($in_question_text) = @_;
 
  if (!$marksdb{"$question"}) {&establish_marks($directionsdb{"mm-marks"});}
  if (!$nmarksdb{"$question"}) {&establish_negative_marks($directionsdb{"mm-negative-marks"});}

  my ($directions_text, $question_text, $hint_text, $explanation_text) = &split_question($in_question_text);
  # split up the answers still further
  my $answer_splitpattern = "$newblank($rtag|$wtag)";
  my @info = split(/$answer_splitpattern/i, $question_text);
 
  # remember actual question
  $question_text = $info[0];
 
  my @answer_list = ();
  my $ndex = 1;
  my $tag;
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$wtag/i) {
      push(@answer_list, &wrong_answer($info[$ndex+1], " "));
      }
    elsif ($tag =~ /$rtag/i) {
      push(@answer_list, &right_continuing_answer($info[$ndex+1], " "));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }
 
  my $temp = &mmhead($marksdb{"$question"},$nmarksdb{"$question"});
  $temp .= $directions_text . $question_text;
  $temp .= &reconstruct_menu_answer_text('MULTIPLE',@answer_list);

  $qdb{"$question"} = $temp;
  $hdb{"$question"} = $hint_text;
  $edb{"$question"} = $explanation_text;
  }

sub mcquestion {
  my ($in_question_text) = @_;
  my ($tag, $ndex, @info, @answer_list, $question_text, $directions_text,
        @letters, $temp, $hint_text, $explanation_text);

  if (!$marksdb{"$question"}) {&establish_marks($directionsdb{"mc-marks"});}
  if (!$nmarksdb{"$question"}) {&establish_negative_marks($directionsdb{"mc-negative-marks"});}

  ($directions_text, $question_text, $hint_text, $explanation_text) = &split_question($in_question_text);
  @letters = ('a'..'z');

  # split up the answers still further
  $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];
  
  @answer_list = ();
  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$wtag/i) {
      push(@answer_list, &wrong_answer(' ' . @letters[$ndex/2] . ' ',$info[$ndex+1]));
      }
    elsif ($tag =~ /$rtag/i) {
      push(@answer_list, &right_answer_no_strip(' ' . @letters[$ndex/2] . ' ',$info[$ndex+1]));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  $temp = &mchead($marksdb{"$question"},$nmarksdb{"$question"});
  $temp .= $directions_text . $question_text;
  $temp .= &reconstruct_answer_text(@answer_list);

  $qdb{"$question"} = $temp;
  $hdb{"$question"} = $hint_text;
  $edb{"$question"} = $explanation_text;
  }

sub reconstruct_menu_answer_text {
  my ($multiple, @answers) = @_;
 
  my $size = scalar(@answers);
  my $s = "<BR> <SELECT NAME=\"answer\" SIZE=$size $multiple>";
  foreach (@answers) {
    my ($value, $text) = split(/\e/,$_);
    $s .= '<OPTION> ' . $value;
    }
  $s .= '</SELECT>';
  $s .= "\n<BR>\n";
  $s .= '<INPUT TYPE="hidden" NAME="answer" VALUE="">';
  $s .= &submit_button("ignore", "Done");
  return $s;
  }

sub reconstruct_answer_text {
  my (@answers) = @_;

  my $s = "";
  foreach (@answers) {
    my ($value, $text) = split(/\e/,$_);
    $s .= "<BR>";
    $s .= &submit_button("answer", $value);
    $s .= $text . "\n";
    }
  return $s;
  }

sub wrong_answer {
  my ($key_text,$answer_text) = @_;

  return $key_text . "\e" . $answer_text;
  }

# First argument is the answer, second argument is the previous answer?
sub right_continuing_answer {
  my ($key_text,$answer_text) = @_;
 
  $key_text =~ s/^\s*//;
  $key_text =~ s/\s*$//;
  if (! defined($answerdb{"$question"})) 
    { $answerdb{"$question"} = "\f" . $key_text . "\e"; }
  else 
    {$answerdb{"$question"} = $answerdb{"$question"} .  $key_text . "\e";}
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }
 
# First argument is the answer, second argument is the previous answer?
sub right_answer {
  local ($key_text,$answer_text) = @_;

  $key_text =~ s/^\s*//;
  $key_text =~ s/\s*$//;
  $answerdb{"$question"} = $answerdb{"$question"} . "\f" . $key_text;
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }

# First argument is the answer, second argument is the previous answer?
sub right_answer_no_strip {
  local ($key_text,$answer_text) = @_;

  #$key_text =~ s/^\s*//;
  #$key_text =~ s/\s*$//;
  $answerdb{"$question"} = $answerdb{"$question"} . "\f" . $key_text;
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }

sub establish_marks {
  local ($marks_text) = @_;

  if (!&is_an_integer($marks_text)) { die "marks text has to be a number"; }
  $marksdb{"$question"} = $marks_text;
  return;
  }

sub establish_negative_marks {
  local ($negative_marks_text) = @_;

  if (!&is_an_integer($negative_marks_text)) { 
    die "$negative_marks_text : negative_marks text has to be a number"; 
    }
  $nmarksdb{"$question"} = $negative_marks_text;
  return;
  }

