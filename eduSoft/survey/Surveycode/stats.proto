#========================================================================
# The student has just started the self-assessment, determine which
# questions he or she should answer, and build the necessary database
#========================================================================
sub starter {
  my %stats;

  # initialise the stats db
  # get how many question sets are on each page
  my ($questionName);
  foreach $questionName (keys %qdbm) {
    $stats{$questionName} = ();
    $stats{$questionName}->{'TOTAL'} = 0;
    $stats{$questionName}->{'ANSWERS'} = ();
    }

  opendir DIR, "$path"  || die "could not open directory $path: $!\n";
  my (@filenames) = grep { /^sadb/ && -f "$path/$_" } readdir(DIR);
  closedir DIR;
  # run through all the stats and collect them
  my $fileName;
  foreach $fileName (@filenames) {
    # open the student log
    &opendb(\%sanswerdb, "$path/$fileName");
    # iterate through the file
    my ($questionId);
    foreach $questionId (keys %sanswerdb) {
      next if ($questionId eq 'seed');
      $stats{$questionId} = () unless defined $stats{$questionId};
      my $questionref = $stats{$questionId};
      $$questionref{'TOTAL'} = 0 if !defined $$questionref{'TOTAL'};
      $$questionref{'TOTAL'} = $$questionref{'TOTAL'} + 1;
      my $answer = $sanswerdb{$questionId};
      $$questionref{'ANSWERS'}->{$answer} = 0 
          if !defined $$questionref{'ANSWERS'}->{$answer};
      $$questionref{'ANSWERS'}->{$answer} =  
          $$questionref{'ANSWERS'}->{$answer} + 1;
      }
    &closedb(\%sanswerdb);
    ##unlink "$path/$fileName";
    }

  # sort the questions, oh the humanity!!  Schwarztian xform, make it so #1
  my @questions = map { $_->[0] }
                  sort { $a->[1] <=> $b->[1]
                                  ||
                         $a->[2] <=> $b->[2]
                                  ||
                         $a->[3] cmp $b->[3]
                  } map { [$_, /(\d+)\.(\d+)/, uc($_)] } keys %stats;
 
  # figure out percentages
  print "<HTML><HEAD><TITLE>Statistics on Survey</TITLE></HEAD><BODY>\n";
  print '<H1><A NAME="top">Overall Statistics</A></H1>';
  print "<FORM>\n";
  foreach (@questions) {
    print "<HR>\n";
    &buildAQuestion($_,  $stats{$_} );
    }
  print "</FORM></BODY></HTML>"; 
}

sub buildAQuestion {
  my ($questionId, $stats) = @_;
  my $answers = $$stats{'ANSWERS'};
  my $total = $$stats{'TOTAL'};

  my ($pageId) = split(/\./,$questionId);

  print $qdbm{$questionId};

  my $statsText = '';
  if (keys %$answers) {
    $statsText .= "<P>Responses are\n";
    $statsText .= "<UL>\n";
    foreach (keys %$answers) {
      $statsText .= "<LI> $_ - ";
      $statsText .= sprintf "%3d%s (%d)\n", ((100.0 * $$answers{$_})/ $total), '%', $$answers{$_};
      }
    $statsText.= "</UL>\n";
    } 
  else { $statsText .= "<P>No responses."; }
  print $statsText;
}

# Test the entry password, if it fails disallow entry to the
# survey and print an appropriate message
sub entry_disallowed {
  
  if ($$data{'password'} eq $directionsdb{'stats-password'}) {return 0;}
  print "Sorry, stats are inactive.";
  return 1;
}
