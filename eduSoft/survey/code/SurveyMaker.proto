sub process_directions{
  local ($line, @lines, $key);
  
  #check to see if test directory exists
  (-e $direction{"test-directory"}) || die "no test directory " . 
                                            $direction{"test-directory"} .
                                            "\n";
  #open databases
  $path = $direction{"test-directory"};
  &open_dbms($path);

  #process class-list
  @lines = split("\n", $direction{"class-list"});
  foreach $line (@lines) {
    $line =~ s/^\s*//;
    $line =~ s/\s*$//;
    $enterdb{$line} = $line;
    }
  delete $direction{"class-list"};

  #fill in relevant values in the directions database
  foreach $key (keys %direction) {
    $directionsdb{$key} = $direction{$key};
    }

  return 1;
}

# open databases
sub open_dbms{
  local ($path) = @_;

  # open and clear some dbs 
  &openAndCleardb(\%directionsdb, "$path/directionsdb");
  &openAndCleardb(\%answerdb, "$path/answerdb");
  &openAndCleardb(\%randomdb, "$path/randomdb");
  &openAndCleardb(\%enterdb, "$path/enterdb");
}

# open databases
sub close_dbms{
  # close dbs 
  &closedb(\%answerdb);
  &closedb(\%randomdb);
  &closedb(\%enterdb);
  &closedb(\%directionsdb);
}

