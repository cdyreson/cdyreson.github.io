  $qdb{"$question"} = $temp;
  }

sub reconstruct_cb_answer_text {
  local (@answers) = @_;
  local ($value, $text, $s);

  $s = '<BR> ';
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    #$s .= "<BR>";
    $s .= '<INPUT TYPE="checkbox" NAME="answer" VALUE="' . $value . '"> ' .
          $value . "\n";
    #$s .= $text . "\n";
    }
  $s .= "\n<BR>\n";
  $s .= &submit_button("ignore", "Done");
  return $s;
  }

sub reconstruct_rb_answer_text {
  local (@answers) = @_;
  local ($value, $text, $s);

  $s = '<BR> ';
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    #$s .= "<BR>";
    $s .= '<INPUT TYPE="radio" NAME="answer" VALUE="' . $value . '"> ' .
          $value . "\n";
    #$s .= $text . "\n";
    }
  $s .= "\n<BR>\n";
  $s .= &submit_button("ignore", "Done");
  return $s;
  }

sub reconstruct_menu_answer_text {
  local ($multiple, @answers) = @_;
  local ($value, $text, $s, $size);

  $size = scalar(@answers);
  $s = "<BR> <SELECT NAME=\"answer\" SIZE=$size $multiple>";
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    #$s .= "<BR>";
    $s .= '<OPTION> ' . $value;
    #$s .= $text . "\n";
    }
  $s .= '</SELECT>';
  $s .= "\n<BR>\n";
  $s .= &submit_button("ignore", "Done");
  return $s;
  }

sub reconstruct_flat_answer_text {
  local (@answers) = @_;
  local ($value, $text, $s);

  $s = "";
  $s .= "\n<BR>\n";
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    #$s .= "<BR>";
    $s .= &submit_button("answer", $value);
    $s .= $text . "\n";
    }
  return $s;
  }

sub reconstruct_answer_text {
  local (@answers) = @_;
  local ($value, $text, $s);

  $s = "";
  foreach (@answers) {
    ($value, $text) = split(/\e/,$_);
    $s .= "<BR>";
    $s .= &submit_button("answer", $value);
    $s .= $text . "\n";
    }
  return $s;
  }

sub wrong_answer {
  local ($key_text,$answer_text) = @_;

  return $key_text . "\e" . $answer_text;
  }

# First argument is the answer, second argument is the previous answer?
sub right_answer {
  local ($key_text,$answer_text) = @_;

  $key_text =~ s/^\s*//;
  $key_text =~ s/\s*$//;
  $answerdb{"$question"} = $answerdb{"$question"} . "\f" . $key_text;
  $answer_text = $key_text . "\e" . $answer_text;
  return $answer_text;
  }

