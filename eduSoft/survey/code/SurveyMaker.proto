sub split_question {
  local ($in_question_text) = @_;
  local ($ndex, @info, $answer_text, $question_text, $directions_text);

  # split up each question still further
  $question_splitpattern = "$newblank($dtag|$htag)";
  @info = split(/$question_splitpattern/i, $in_question_text);

  # remember out actual question
  $question_text = $info[0];
  $directions_text = "";

  $ndex = 1;
  while ($tag = $info[$ndex]) {
    # directions
    if ($tag =~ /$dtag/i) {
      $directions_text = $info[$ndex + 1];
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }
  return ($directions_text, $question_text);
}

sub truequestion {
  local ($in_question_text) = @_;
  local ($temp, @info, $directions_text, $question_text, @answer_list);


  ($directions_text, $question_text) = &split_question($in_question_text);
  @answer_list = (&right_answer("true"," "), &wrong_answer("false"," "));
  $temp = $QUESTION_HEADER_TEXT;
  $temp .= &tfhead();
  $temp .= $directions_text . "<P>" . $question_text;
  $temp .= &reconstruct_answer_text(@answer_list);

  $qdb{"$question"} = $temp;
  }

