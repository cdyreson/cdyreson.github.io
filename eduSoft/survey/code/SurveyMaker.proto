sub eaquestion {
  local ($in_question_text) = @_;
  local (@answer_list, $ndex, $tag, $temp, @info, $directions_text, $ans,
        $question_text, $answer_text);

  # split question
  ($directions_text, $question_text) = &split_question($in_question_text);

  @info = ();
  # split up the answers still further
  $answer_splitpattern = "$newblank($rtag|$wtag)";
  @info = split(/$answer_splitpattern/i, $question_text);

  # remember actual question
  $question_text = $info[0];
  
  @answer_list = ();
  $ndex = 1;
  $tag = $info[$ndex];
  while ($tag = $info[$ndex]) {
    # right answer
    if ($tag =~ /$rtag/i) {
      # answers must be all on one line!
      @ans = split(/\n/,$info[$ndex+1]);
      push(@answer_list, &right_answer($ans[0],$ans[0]));
      }
    else {
      die "unrecognized tag $tag \n";
      }
    $ndex += 2;
    }

  $temp = '';
  $temp = $QUESTION_HEADER_TEXT;
  $temp .= &eahead();
  $temp .= $directions_text . $question_text;
  #$temp .= &reconstruct_answer_text(@answer_list);
  $temp .= "<BR> Put your answer here <INPUT TYPE=\"text\" NAME=\"answer\" VALUE=\"\" SIZE=30>";
  $temp .= "\n<BR>\n" . &submit_button("ignore", "Done");
  $qdb{"$question"} = $temp;
  }

