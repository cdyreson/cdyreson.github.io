use MyDB;

# Lincoln Stein's Fantabulous CGI package
use CGI;
 
$query = new CGI;
$ROOT = '&&&ROOT&&&';

# Build the header
print $query->header;
print $query->start_html("Directions",'&&&MAILTO&&&');

# Open databases
$path = $query->param('path');
&opendb(\%directionsdb, "$path/directionsdb");
&opendb(\%randomdb, "$path/randomdb");
if (-e "$path/enterdb") { 
  $SECURITY=1; 
  &opendb(\%enterdb, "$path/enterdb");
  }
else { 
  $SECURITY=0; 
  %enterdb = ();
  }

# Make a security check
if (&entry_disallowed()) {
  print $query->end_html;
  exit();
  }

# Security passed, continue with entry
$person = $query->param("password");

#crop person
$person =~ s/^\s*//;
$person =~ s/\s*$//;
$userid = $enterdb{$person};
if (-e "$path/sadb$userid") {
  &opendb(\%sanswerdb, "$path/sadb$userid");
  #previously opened
  $seed = $sanswerdb{"seed"};
  }
else {
  # open new answer db
  &opendb(\%sanswerdb, "$path/sadb$userid");
  $seed = time;
  $sanswerdb{"seed"} = $seed;
  }

srand($seed);
@question_list = ();
@answered_list = ();
@keys = sort(keys(%randomdb));
$questions_max = scalar(@keys);
for ($i=1; $i <= $questions_max; $i++) {
  $j = int(rand($randomdb{$i})) + 1;
  $question = "$i:$j";
  if (defined($sanswerdb{$question})) {push(@answered_list,$question);}
  else {push(@question_list,$question);}
  }

print $query->startform('POST',"$ROOT/marker");
print $query->hidden('userid',$person);
print $query->hidden('path',$query->param('path'));
#print $query->hidden('total_questions',$query->param('total_questions'));
print $query->hidden('remaining_questions',join("\e",@question_list));
print $query->hidden('answered_questions',join("\e",@answered_list));

if ($directionsdb{'entry-text'}) {
  print $directionsdb{'entry-text'};
  }
else {
  print <<'ENDofMESSAGE';
    Thank you for taking the time to fill out this survey. 
    You may leave the survey and return at any point in time or 
    if the machine crashes, you may restart the survey. 
    However, you may only submit the survey once. 
    Use the mouse to select your choices and enter 
    text via the keyboard when appropriate. 
    Fill out the survey at your own pace.  When you are finished 
    (or whenever you like), review your answers by choosing the 
    appropriate button. <P> 
    To start the survey press this button. 
ENDofMESSAGE
  }
print $query->submit("action", "Start Survey");

print $query->endform;
print $query->end_html;

# Test the entry password, if it fails disallow entry to the
# survey and print an appropriate message
sub entry_disallowed {

  my ($password) = $query->param('password');
  $password =~ s/^\s*//;
  $password =~ s/\s*$//;

  # is security off?  For the fake survey.
  if (!$SECURITY) {
    $enterdb{$password} = $password;
    return 0;
    }

  return 0 if defined $enterdb{$password};
  print "Sorry, this entry password is inactive.";
  return 1;
}

