use MyDB;

# Lincoln Stein's Fantabulous CGI package
use CGI;
$query = new CGI;

#open databases
print $query->header;
$us = $query->param('userid');
$path = $query->param("path");
&opendb(\%directionsdb, "$path/directionsdb");
&opendb(\%randomdb, "$path/randomdb");
if (-e "$path/enterdb") {
  &opendb(\%enterdb, "$path/enterdb");
  }
else {
  %enterdb = ();
  }
&opendb(\%sanswersdb, "$path/sadb$us");

# Don't worry be happy
print $query->start_html("Survey Finished",'&&&MAILTO&&&');

# Remove from entry dbms
delete $enterdb{$us};

print '<P>';
print $directionsdb{'exit-text'};
print '<P>';
print $directionsdb{'return-to-where'};
print $query->end_html;
