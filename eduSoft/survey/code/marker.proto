use MyDB;

# Lincoln Stein's Fantabulous CGI package
use CGI;
$query = new CGI;
$ROOT = '&&&ROOT&&&';

# Open databases
$path = $query->param('path');
$us = $query->param('userid');
print $query->header;
# Make a security check
die $query->end_html unless &referer_check();
 
# Security passed, continue 
#open databases
&opendb(\%qdb, "$path/questiondb");
&opendb(\%sanswersdb, "$path/sadb$us");

if (defined($query->param('answer'))) {
  $us = $query->param('userid');
  $qu = $query->param('question');
  $ans = $query->param('answer');
  @ans = $query->param('answer');
  $sanswersdb{"$qu"} = substr(join("\f",@ans),0,1000);
  }

@question_list = split(/\e/,$query->param('remaining_questions'));
@answered_list = split(/\e/,$query->param('answered_questions'));
$question = shift(@question_list);
($sec, $ques) = split("\:",$question);

# Check to see if we have any questions left, if we do then process the
#  question normally
if ($question) {

  print $query->start_html("Question $sec",'&&&MAILTO&&&');
  print $query->startform('POST',"$ROOT/marker");
  print &hidden('path',$path);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('question',$question);
  print &hidden('remaining_questions',join("\e",@question_list));
  print &hidden('answered_questions',join("\e",(@answered_list,$question)));
  print $qdb{"$question"};

  print $query->endform;
  print $query->startform('POST',"$ROOT/marker");
  print &hidden('path',$path);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('remaining_questions',join("\e",(@question_list,$question)));
  print &hidden('answered_questions',join("\e",@answered_list));
  print "<HR>";
  print "To skip this question for now, press here";
  print $query->submit("action", "Skip Question");
  print $query->endform;
  print $query->startform('POST',"$ROOT/reviewer");
  print &hidden('path',$path);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('still_to_review',join("\e",@answered_list));
  print &hidden('remaining_questions',join("\e",($question,@question_list)));
  print &hidden('answered_questions',join("\e",@answered_list));
  print "To review your responses to now, press here";
  print $query->submit("action", "Review Responses");
  print $query->endform;
  print $query->end_html;

} # end of if there really is a question

# now do the case where we have hit the final page
else {

  print $query->start_html("Turnin Survey",'&&&MAILTO&&&');
  print $query->startform('POST',"$ROOT/poster");
  print &hidden('path',$path);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('answered_questions',join("\e",(@answered_list,$question)));

  print $query->param('userid') . " has completed the survey <BR>" ; 
  print "To turnin the survey, press this button ";
  print $query->submit("action", "Done");
  print $query->end_html;
  print $query->endform;

  print '<HR>';
  print $query->startform('POST',"$ROOT/reviewer");
  print &hidden('path',$path);
  print &hidden('userid',$query->param('userid'));
  print &hidden('total_questions',$query->param('total_questions'));
  print &hidden('still_to_review',join("\e",@answered_list));
  print &hidden('remaining_questions',join("\e",($question,@question_list)));
  print &hidden('answered_questions',join("\e",@answered_list));
  print "To review your responses, click here";
  print $query->submit("action", "Review");
  print $query->endform;
  
  print $query->end_html;

} # end of final page section

sub hidden {
  my ($name, $value) = @_;
  $query->param($name, $value);
  return $query->hidden($name, $value);
}
 
# Test the HTTP_REFERER variable, if it fails disallow entry to the
# survey and print an appropriate message
sub referer_check{
  my ($referer) = $ENV{'HTTP_REFERER'};
 
  if ($referer =~ /^$ROOT/) { return 1; }
  print "Sorry, access attempted from an untrustworthy source.";
  return 0;
}
