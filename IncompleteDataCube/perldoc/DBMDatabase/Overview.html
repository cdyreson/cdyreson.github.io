<H2><A NAME="Description">Description</A></H2>
<P>
This is a simple database to store objects. That class provides methods to
swizzle and unswizzle objects.

<P>
The DBMDatabase uses 
<FONT SIZE=-1>DBM</FONT> files to store the objects. There is one 
<FONT SIZE=-1>DBM</FONT> file for each
 <A HREF="http://www.eecs.wsu.edu/~cdyreson/pub/IncompleteDataCube/perldoc/DBMDatabase/Table.html">DBMDatabase::Table</A>.
